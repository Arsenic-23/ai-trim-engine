<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trim Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=10">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.77 3.77z" fill="currentColor"/>
                </svg>
                <span>AI Trim Engine</span>
            </div>
        </header>

        <main class="main-content" id="main-content">
            <!-- Initial State: Upload and Prompt -->
            <div class="centered-box" id="initial-view">
                <div class="hero-header">
                    <h1 class="hero-title">Intelligent Video Trimming</h1>
                    <p class="hero-subtitle">Upload your video and describe your edits in plain language</p>
                </div>

                <div class="card-container">
                    <div class="upload-area" id="upload-area">
                        <input type="file" id="video-upload" accept="video/mp4,video/x-m4v,video/*" hidden>
                        
                        <!-- Idle State -->
                        <div class="upload-idle-state" id="upload-idle-state">
                            <div class="upload-icon-wrapper">
                                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="17 8 12 3 7 8"></polyline>
                                    <line x1="12" y1="3" x2="12" y2="15"></line>
                                </svg>
                            </div>
                            <div class="upload-text">
                                <h3>Upload video or <span class="browse-link">drag & drop</span></h3>
                                <p>MP4, MOV, M4V formats supported</p>
                            </div>
                        </div>

                        <!-- Active Video Preview State -->
                        <div class="upload-preview-container hidden" id="upload-preview-container">
                            <div class="video-preview-wrapper">
                                <video id="upload-video-preview" muted playsinline loop autoplay></video>
                                <div class="video-overlay-badge">PREVIEW</div>
                            </div>
                            <div class="upload-preview-info">
                                <div class="preview-filename-row">
                                    <span id="preview-filename" class="preview-filename">filename.mp4</span>
                                    <button type="button" id="change-video-btn" class="change-video-btn">Change Video</button>
                                </div>
                                <div class="preview-meta-row">
                                    <span id="preview-duration">00:00</span>
                                    <span class="meta-dot">•</span>
                                    <span id="preview-filesize">0 MB</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="prompt-container">
                        <div class="prompt-input-wrapper">
                            <input type="text" id="prompt-input" autocomplete="off">
                            <button id="submit-btn" class="submit-btn" disabled title="Start AI Processing">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Processing State: Two Columns -->
            <div class="split-view hidden" id="split-view">
                <!-- Left Panel: Videos -->
                <div class="left-panel">
                    <div class="video-container original">
                        <div class="video-header">
                            <span class="badge">Original Source</span>
                        </div>
                        <video id="original-video" controls></video>
                    </div>

                    <div class="video-container generated hidden" id="generated-video-container">
                        <div class="video-header">
                            <span class="badge success">Trimmed Output</span>
                        </div>
                        <video id="generated-video" controls></video>
                    </div>
                </div>

                <!-- Right Panel: Logs, Chat, Report -->
                <div class="right-panel">
                    
                    <!-- Ingestion Logs -->
                    <div class="panel-section logs-section" id="logs-section">
                        <div class="section-header">
                            <div class="spinner"></div>
                            <span>Ingestion Logs</span>
                        </div>
                        <div class="terminal" id="terminal">
                            <!-- Logs injected here -->
                        </div>
                    </div>

                    <!-- Chat Interface -->
                    <div class="panel-section chat-section hidden" id="chat-section">
                        <div class="section-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                            <span>Agent Action</span>
                        </div>
                        <div class="chat-container" id="chat-container">
                            <!-- Chat messages injected here -->
                        </div>
                    </div>

                    <!-- Final Report -->
                    <div class="panel-section report-section hidden" id="report-section">
                        <div class="section-header">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                            <span>Execution Report</span>
                        </div>
                        <div class="report-content" id="report-content">
                            <!-- Report injected here -->
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>
    <script src="script.js?v=10"></script>
</body>
</html>
